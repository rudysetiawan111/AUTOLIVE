<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AUTOLIVE Dashboard Login</title>
  <style>
    body { font-family: Arial; text-align: center; margin-top: 50px; }
    button { margin: 10px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>

  <h1># Welcome to AUTOLIVE</h1>
  <p>Manage and analyze trending YouTube & TikTok videos</p>

  <!-- Login Buttons -->
  <div>
    <button id="loginGoogle">Login with Google</button>
    <button id="loginTikTok">Login with TikTok</button>
  </div>

  <script>
    // Google Login (dummy)
    document.getElementById('loginGoogle').onclick = () => {
      alert('Google login successful (dummy)');
      window.location.href = 'home.html';
    };

    // TikTok Login
    const TIKTOK_CLIENT_KEY = "awf22yr9a734f9s2";
    const REDIRECT_URI = "home.html";
    document.getElementById('loginTikTok').onclick = () => {
      const state = 'demoState123';
      const scope = 'user.info.basic,user.info.stats,video.list';
      const url = `https://www.tiktok.com/auth/authorize?client_key=${TIKTOK_CLIENT_KEY}&response_type=code&scope=${encodeURIComponent(scope)}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&state=${state}`;
      window.location.href = url;
    };
  </script>

</body>
</html>
