<svg width="300" height="200" viewBox="0 0 300 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="errorGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f56565" stop-opacity="0.1"/>
            <stop offset="100%" stop-color="#e53e3e" stop-opacity="0.1"/>
        </linearGradient>
    </defs>
    
    <!-- Background -->
    <rect width="300" height="200" fill="url(#errorGradient)"/>
    
    <!-- 404 Numbers -->
    <text x="50" y="100" font-family="Arial" font-weight="bold" font-size="80" fill="#f56565">4</text>
    <text x="130" y="100" font-family="Arial" font-weight="bold" font-size="80" fill="#f56565">0</text>
    <text x="210" y="100" font-family="Arial" font-weight="bold" font-size="80" fill="#f56565">4</text>
    
    <!-- Broken Line -->
    <path d="M80 130L120 150L160 120L200 140" stroke="#f56565" stroke-width="3" stroke-dasharray="5 5"/>
    
    <!-- Text -->
    <text x="150" y="170" font-family="Arial" font-size="16" fill="#718096" text-anchor="middle">
        Page Not Found
    </text>
    
    <!-- Search Icon -->
    <circle cx="150" cy="130" r="15" stroke="#f56565" stroke-width="2" fill="none"/>
    <line x1="160" y1="140" x2="170" y2="150" stroke="#f56565" stroke-width="2"/>
</svg>
