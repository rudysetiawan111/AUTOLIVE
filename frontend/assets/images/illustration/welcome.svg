<svg width="300" height="200" viewBox="0 0 300 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="welcomeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#667eea" stop-opacity="0.1"/>
            <stop offset="100%" stop-color="#764ba2" stop-opacity="0.1"/>
        </linearGradient>
        <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#667eea"/>
            <stop offset="100%" stop-color="#764ba2"/>
        </linearGradient>
    </defs>
    
    <!-- Background -->
    <rect width="300" height="200" fill="url(#welcomeGradient)"/>
    
    <!-- Wave Pattern -->
    <path d="M0 150 Q50 130 100 150 T200 150 T300 150" stroke="url(#waveGradient)" stroke-width="3" fill="none"/>
    <path d="M0 170 Q50 150 100 170 T200 170 T300 170" stroke="url(#waveGradient)" stroke-width="2" fill="none" opacity="0.5"/>
    
    <!-- Rocket -->
    <g transform="translate(130, 60)">
        <path d="M20 0L40 20L0 20L20 0Z" fill="#f56565"/>
        <rect x="15" y="20" width="10" height="30" fill="#4299e1"/>
        <circle cx="20" cy="55" r="5" fill="#f6ad55"/>
    </g>
    
    <!-- Stars -->
    <circle cx="80" cy="40" r="3" fill="#f6ad55"/>
    <circle cx="220" cy="80" r="4" fill="#f687b3"/>
    <circle cx="250" cy="30" r="2" fill="#68d391"/>
    
    <!-- Text -->
    <text x="150" y="120" font-family="Arial" font-weight="bold" font-size="20" fill="#667eea" text-anchor="middle">
        Welcome to
    </text>
    <text x="150" y="150" font-family="Arial" font-weight="bold" font-size="24" fill="url(#waveGradient)" text-anchor="middle">
        AutoLive
    </text>
</svg>
