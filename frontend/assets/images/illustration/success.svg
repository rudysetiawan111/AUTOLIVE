<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="successGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#48bb78" stop-opacity="0.1"/>
            <stop offset="100%" stop-color="#38a169" stop-opacity="0.1"/>
        </linearGradient>
    </defs>
    
    <!-- Background Circle -->
    <circle cx="100" cy="100" r="80" fill="url(#successGradient)"/>
    
    <!-- Success Check -->
    <circle cx="100" cy="100" r="50" fill="#48bb78" fill-opacity="0.2" stroke="#48bb78" stroke-width="2"/>
    <path d="M70 100L90 120L130 80" stroke="#48bb78" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Sparkles -->
    <circle cx="140" cy="60" r="5" fill="#f6ad55"/>
    <circle cx="50" cy="140" r="5" fill="#f687b3"/>
    <circle cx="160" cy="150" r="3" fill="#4299e1"/>
    
    <!-- Text -->
    <text x="100" y="160" font-family="Arial" font-size="14" fill="#48bb78" text-anchor="middle">
        Success!
    </text>
</svg>
