<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Marga Jaya Bird Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }
        .card-header {
            background: transparent;
            border-bottom: 2px solid #f0f0f0;
            text-align: center;
            padding: 30px 20px 20px;
        }
        .card-header h3 {
            color: #333;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .card-header p {
            color: #666;
            font-size: 14px;
        }
        .form-control, .form-select {
            border-radius: 10px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: none;
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            color: white;
            font-weight: 600;
            transition: transform 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .social-login {
            border-top: 2px solid #f0f0f0;
            margin-top: 25px;
            padding-top: 20px;
        }
        .alert {
            border-radius: 10px;
            border: none;
        }
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-dove me-2"></i>Marga Jaya Bird Shop</h3>
                        <p>Silakan login untuk mengakses dashboard</p>
                    </div>
                    <div class="card-body p-4">
                        <div id="alertMessage" class="alert d-none" role="alert"></div>
                        
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="email" class="form-label">Alamat Email</label>
                                <div class="position-relative">
                                    <input type="email" class="form-control" id="email" name="email" 
                                           placeholder="Masukkan email Anda" required>
                                    <i class="fas fa-envelope position-absolute" style="right: 15px; top: 50%; transform: translateY(-50%); color: #666;"></i>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label for="password" class="form-label">Password</label>
                                <div class="position-relative">
                                    <input type="password" class="form-control" id="password" name="password" 
                                           placeholder="Masukkan password" required>
                                    <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-login w-100 mb-3">
                                <i class="fas fa-sign-in-alt me-2"></i>Login
                            </button>
                            
                            <div class="text-center">
                                <p class="mb-0">Belum punya akun? 
                                    <a href="register.html" class="text-primary">Daftar sekarang</a>
                                </p>
                            </div>
                        </form>
                        
                        <div class="social-login text-center">
                            <p class="text-muted mb-3">Atau login dengan</p>
                            <div class="d-flex justify-content-center gap-3">
                                <a href="#" class="btn btn-outline-danger" onclick="handleGoogleLogin()">
                                    <i class="fab fa-google me-2"></i>Google
                                </a>
                                <a href="#" class="btn btn-outline-primary" onclick="handleFacebookLogin()">
                                    <i class="fab fa-facebook-f me-2"></i>Facebook
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Info Admin -->
                <div class="card mt-3">
                    <div class="card-body p-3 text-center">
                        <small class="text-muted">
                            <i class="fas fa-info-circle me-1"></i>
                            Admin: marga.jaya.bird.shop@gmail.com
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const password = document.getElementById('password');
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // Handle login form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertDiv = document.getElementById('alertMessage');
            
            // Admin credentials
            const adminEmail = 'marga.jaya.bird.shop@gmail.com';
            const adminPassword = '@Rs101185';
            
            try {
                // Cek kredensial admin
                if (email === adminEmail && password === adminPassword) {
                    // Login admin berhasil
                    const userData = {
                        email: email,
                        name: 'Admin Marga Jaya',
                        role: 'admin',
                        isAdmin: true
                    };
                    
                    localStorage.setItem('user', JSON.stringify(userData));
                    localStorage.setItem('token', 'admin_token_' + Date.now());
                    
                    alertDiv.className = 'alert alert-success';
                    alertDiv.innerHTML = '<i class="fas fa-check-circle me-2"></i>Login admin berhasil! Mengalihkan...';
                    alertDiv.classList.remove('d-none');
                    
                    setTimeout(() => {
                        window.location.href = '../dashboard/admin-dashboard.html';
                    }, 1500);
                } else {
                    // Cek user biasa di localStorage
                    const users = JSON.parse(localStorage.getItem('users') || '[]');
                    const user = users.find(u => u.email === email && u.password === password);
                    
                    if (user) {
                        // Login user biasa berhasil
                        const userData = {
                            email: user.email,
                            name: user.name,
                            role: 'user',
                            isAdmin: false
                        };
                        
                        localStorage.setItem('user', JSON.stringify(userData));
                        localStorage.setItem('token', 'user_token_' + Date.now());
                        
                        alertDiv.className = 'alert alert-success';
                        alertDiv.innerHTML = '<i class="fas fa-check-circle me-2"></i>Login berhasil! Mengalihkan...';
                        alertDiv.classList.remove('d-none');
                        
                        setTimeout(() => {
                            window.location.href = '../dashboard/user-dashboard.html';
                        }, 1500);
                    } else {
                        // Login gagal
                        alertDiv.className = 'alert alert-danger';
                        alertDiv.innerHTML = '<i class="fas fa-exclamation-circle me-2"></i>Email atau password salah!';
                        alertDiv.classList.remove('d-none');
                        
                        setTimeout(() => {
                            alertDiv.classList.add('d-none');
                        }, 3000);
                    }
                }
            } catch (error) {
                alertDiv.className = 'alert alert-danger';
                alertDiv.innerHTML = '<i class="fas fa-exclamation-circle me-2"></i>Terjadi kesalahan. Silakan coba lagi.';
                alertDiv.classList.remove('d-none');
            }
        });

        // Social login handlers
        function handleGoogleLogin() {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.className = 'alert alert-warning';
            alertDiv.innerHTML = '<i class="fas fa-info-circle me-2"></i>Fitur login dengan Google akan segera tersedia.';
            alertDiv.classList.remove('d-none');
            
            setTimeout(() => {
                alertDiv.classList.add('d-none');
            }, 3000);
        }

        function handleFacebookLogin() {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.className = 'alert alert-warning';
            alertDiv.innerHTML = '<i class="fas fa-info-circle me-2"></i>Fitur login dengan Facebook akan segera tersedia.';
            alertDiv.classList.remove('d-none');
            
            setTimeout(() => {
                alertDiv.classList.add('d-none');
            }, 3000);
        }

        // Cek apakah sudah login
        window.onload = function() {
            const user = localStorage.getItem('user');
            if (user) {
                const userData = JSON.parse(user);
                if (userData.role === 'admin') {
                    window.location.href = '../dashboard/admin-dashboard.html';
                } else {
                    window.location.href = '../dashboard/user-dashboard.html';
                }
            }
        };
    </script>
</body>
</html>
