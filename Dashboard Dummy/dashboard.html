<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AUTOLIVE Dashboard</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    h1 { text-align: center; }
    .stats, .video-list { margin: 30px auto; max-width: 800px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
    th { background: #f0f0f0; }
    .button { padding: 8px 15px; background: #25F4EE; border: none; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>AUTOLIVE Dashboard</h1>

  <div class="stats">
    <h2>User Analytics (Dummy Data)</h2>
    <table>
      <tr><th>Metric</th><th>Value</th></tr>
      <tr><td>Followers</td><td>12,345</td></tr>
      <tr><td>Total Videos</td><td>23</td></tr>
      <tr><td>Total Views</td><td>145,678</td></tr>
      <tr><td>Engagement Rate</td><td>7.5%</td></tr>
    </table>
  </div>

  <div class="video-list">
    <h2>Video List (Dummy Data)</h2>
    <table>
      <tr>
        <th>Title</th>
        <th>Views</th>
        <th>Likes</th>
        <th>Action</th>
      </tr>
      <tr>
        <td>Funny Cat Video</td>
        <td>12,345</td>
        <td>1,200</td>
        <td><button class="button">View Analytics</button></td>
      </tr>
      <tr>
        <td>Trending Dance</td>
        <td>45,678</td>
        <td>3,450</td>
        <td><button class="button">View Analytics</button></td>
      </tr>
      <tr>
        <td>Tech Review</td>
        <td>10,234</td>
        <td>980</td>
        <td><button class="button">View Analytics</button></td>
      </tr>
    </table>
  </div>
</body>
</html>
